<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* PANTALLAS */
.screen{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.active{
    display:flex;
}

/* LOGIN */
input{
    padding:12px;
    border-radius:10px;
    border:none;
}

button{
    margin-top:10px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

/* HOME */
.carousel{
    width:100%;
    height:200px;
    overflow:hidden;
    position:relative;
}

.carousel img{
    position:absolute;
    width:100%;
    height:200px;
    object-fit:cover;
    opacity:0;
    transition:1s;
}

.carousel img.active{
    opacity:1;
}

.container{
    display:flex;
    flex-wrap:wrap;
}

.card{
    flex:1;
    padding:10px;
}

.card img{
    width:100%;
    border-radius:15px;
    box-shadow:0 0 10px pink;
}

/* FINAL */
.heart{
    position:absolute;
    color:pink;
    animation:subir 5s linear infinite;
}

@keyframes subir{
    from{transform:translateY(0);}
    to{transform:translateY(-600px);}
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
    <h2>Amor 💙</h2>
    <p>Ingresa nuestra fecha</p>
    <input type="password" id="pass" placeholder="18/02/2026">
    <button onclick="entrar()">Entrar</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- HOME -->
<div id="home" class="screen">

    <div class="carousel">
        <img src="img1.jpg" class="active">
        <img src="img2.jpg">
        <img src="img3.jpg">
    </div>

    <div class="container">

        <div class="card">
            <img src="img1.jpg">
            <p>Contigo todo se siente bonito 💙</p>
        </div>

        <div class="card">
            <img src="img2.jpg">
            <p>Aunque estés lejos, sigues aquí conmigo 😔</p>
        </div>

        <div class="card">
            <img src="img3.jpg">
            <p>Eres muy importante para mí ❤️</p>
        </div>

    </div>

    <p>No importa la distancia… yo sigo firme contigo 💙</p>

    <button onclick="final()">Abrir</button>

</div>

<!-- FINAL -->
<div id="final" class="screen">
    <h2>
        Amor… 💙<br><br>
        sé que estás lejos…<br>
        pero lo que siento por ti es real ❤️<br><br>
        18/02/2026 💕
    </h2>
</div>

<script>

/* LOGIN */
function entrar(){
    let p = document.getElementById("pass").value;

    if(p === "18/02/2026"){
        cambiar("login","home");
    } else {
        document.getElementById("error").innerText="Fecha incorrecta 😔";
    }
}

/* CAMBIAR PANTALLA */
function cambiar(a,b){
    document.getElementById(a).classList.remove("active");
    document.getElementById(b).classList.add("active");
}

/* IR FINAL */
function final(){
    cambiar("home","final");

    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*100+"vw";

        document.body.appendChild(h);

        setTimeout(()=>h.remove(),5000);
    },300);
}

/* CARRUSEL */
let i=0;
let imgs=document.querySelectorAll(".carousel img");

setInterval(()=>{
    imgs[i].classList.remove("active");
    i=(i+1)%imgs.length;
    imgs[i].classList.add("active");
},3000);

</script>

</body>
</html>
